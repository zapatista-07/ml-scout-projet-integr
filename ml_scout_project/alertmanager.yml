global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'mlscout-alerts@example.com'

# Route tree
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  receiver: 'ml-scout-logs'

  routes:
    - match:
        severity: critical
      receiver: 'ml-scout-critical'
      group_wait: 5s
      repeat_interval: 15m

    - match:
        severity: warning
      receiver: 'ml-scout-logs'
      repeat_interval: 30m

receivers:
  # Log-only receiver (always works, no external dependency)
  - name: 'ml-scout-logs'
    webhook_configs:
      - url: 'http://monitoring-api:5001/alerts/webhook'
        send_resolved: true

  # Critical alerts
  - name: 'ml-scout-critical'
    webhook_configs:
      - url: 'http://monitoring-api:5001/alerts/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
