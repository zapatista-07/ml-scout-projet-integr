global:
  scrape_interval: 10s          # Scrape every 10 seconds
  evaluation_interval: 10s      # Evaluate rules every 10 seconds
  scrape_timeout: 8s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:

  # ML Scout Monitoring API
  - job_name: 'ml_scout_api'
    static_configs:
      - targets: ['monitoring-api:5001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
