version: '3.8'

services:
  # ── Flask API ML Scout ──────────────────────────────────────────────────────
  ml-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_scout_api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./visuals:/app/visuals:ro
      - ./mlflow.db:/app/mlflow.db
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - ml_network

  # ── MLflow UI ───────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_ui
    ports:
      - "5001:5001"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5001
    restart: unless-stopped
    networks:
      - ml_network

  # ── n8n (optionnel — si tu veux tout dans Docker) ────────────────────────────
  # n8n:
  #   image: docker.n8n.io/n8nio/n8n
  #   container_name: n8n
  #   ports:
  #     - "5678:5678"
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #   environment:
  #     - N8N_BASIC_AUTH_ACTIVE=false
  #   restart: unless-stopped
  #   networks:
  #     - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  n8n_data:
