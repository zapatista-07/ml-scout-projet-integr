version: '3.8'

# =============================================================================
# ML Scout — Full Stack with Monitoring (S13)
# Services: Flask API + Monitoring API + Prometheus + Grafana + Alertmanager
# =============================================================================

services:

  # ── Flask ML API (original) ─────────────────────────────────────────────────
  ml-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_scout_api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models
      - ./visuals:/app/visuals:ro
      - ./mlflow.db:/app/mlflow.db
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - ml_network

  # ── Monitoring API (Prometheus metrics + drift detection) ───────────────────
  monitoring-api:
    build:
      context: .
      dockerfile: Dockerfile.monitoring
    container_name: ml_scout_monitoring
    ports:
      - "5001:5001"
    volumes:
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ml_network

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ml_scout_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    depends_on:
      - monitoring-api
    networks:
      - ml_network

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ml_scout_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - ml_network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: ml_scout_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mlscout2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/ml_scout_dashboard.json
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - ml_network

  # ── MLflow UI ───────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_ui
    ports:
      - "5002:5001"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5001
    restart: unless-stopped
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  n8n_data:
